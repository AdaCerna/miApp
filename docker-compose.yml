version: "3.9"

services:

  db:
    image: mariadb:11
    container_name: miapp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: bd_ventas
      MYSQL_USER: ventas_user
      MYSQL_PASSWORD: ventas_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: miapp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: bd_ventas
      DB_USER: ventas_user
      DB_PASS: ventas_pass
    volumes:
      - ./backend/src:/var/www/html
    ports:
      - "8080:80"

  frontend:
    build: ./frontend
    container_name: miapp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080/api/usuarios.php
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:5173"

volumes:
  db_data:
